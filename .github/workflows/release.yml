name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish APT repo
        run: |
          # Collect .deb files and install script
          mkdir -p apt-repo
          cp dist/*.deb apt-repo/ 2>/dev/null || true
          cp install.sh uninstall.sh apt-repo/

          # Generate APT metadata
          cd apt-repo
          dpkg-scanpackages --multiversion . /dev/null > Packages
          gzip -k -f Packages

          # Generate Release file
          apt-ftparchive release . > Release

          cd ..

          # Push to gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages-tmp
          git rm -rf .
          cp -r apt-repo/* .
          git add *.deb Packages Packages.gz Release install.sh uninstall.sh
          git commit -m "Update APT repo for ${GITHUB_REF_NAME}"
          git push origin HEAD:gh-pages --force
