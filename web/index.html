<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>webtop</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --orange: #f0883e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .logo {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent); }
  .tabs {
    display: flex;
    gap: 4px;
  }
  .tab {
    padding: 6px 16px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-dim);
    cursor: pointer;
    border: none;
    background: none;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--text); background: var(--surface); }
  .tab.active { color: var(--text); background: var(--surface); }
  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-dim);
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--red);
  }
  .status-dot.connected { background: var(--green); }
  .search-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    color: var(--text);
    font-size: 14px;
    width: 240px;
    outline: none;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text-dim); }
  main { padding: 16px 24px; }
  .page { display: none; }
  .page.active { display: block; }

  /* Ports page */
  .stats {
    display: flex;
    gap: 24px;
    margin-bottom: 16px;
    font-size: 13px;
    color: var(--text-dim);
  }
  .stats strong { color: var(--text); }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    table-layout: fixed;
  }
  thead th {
    text-align: left;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text-dim);
    font-weight: 500;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    position: relative;
    overflow: hidden;
  }
  .resize-handle {
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 4px;
    cursor: col-resize;
    background: transparent;
  }
  .resize-handle:hover,
  .resize-handle.active {
    background: var(--accent);
  }
  thead th:hover { color: var(--text); }
  thead th.sorted { color: var(--accent); }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  tbody tr:hover { background: var(--surface); }
  td {
    padding: 8px 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .proto {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
  }
  .proto-tcp { background: rgba(88, 166, 255, 0.15); color: var(--accent); }
  .proto-udp { background: rgba(210, 153, 34, 0.15); color: var(--yellow); }
  .count-badge {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    background: rgba(63, 185, 80, 0.15);
    color: var(--green);
  }
  .empty-state {
    text-align: center;
    padding: 60px 0;
    color: var(--text-dim);
  }
  .empty-state p { font-size: 15px; margin-top: 8px; }

  /* GPU page */
  .gpu-cards {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 16px;
  }
  @media (max-width: 1200px) {
    .gpu-cards { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 600px) {
    .gpu-cards { grid-template-columns: 1fr; }
  }
  .gpu-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
  }
  .gpu-card-header {
    margin-bottom: 8px;
    font-size: 12px;
  }
  .gpu-card-name {
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
    font-size: 11px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .gpu-card-stats {
    display: flex;
    gap: 14px;
    color: var(--text-dim);
    font-size: 11px;
  }
  .gpu-card-stats span::before {
    content: '';
    display: inline-block;
    width: 10px;
    height: 3px;
    margin-right: 5px;
    vertical-align: middle;
    border-radius: 1px;
  }
  .gpu-card-stats .util-val::before { background: var(--accent); }
  .gpu-card-stats .mem-val::before { background: var(--green); }
  .gpu-card-stats .util-val { color: var(--accent); font-weight: 600; }
  .gpu-card-stats .mem-val { color: var(--green); font-weight: 600; }
  .gpu-card canvas {
    width: 100%;
    height: 120px;
    display: block;
  }
  .gpu-procs-section {
    margin-top: 16px;
  }
  .gpu-procs-section h3 {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dim);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .gpu-procs-table {
    table-layout: auto;
  }
  .gpu-procs-table th {
    cursor: default;
  }
</style>
</head>
<body>
<header>
  <div class="header-left">
    <div class="logo">web<span>top</span></div>
    <div class="tabs">
      <button class="tab active" data-page="ports">Ports</button>
      <button class="tab" data-page="gpu">GPU</button>
    </div>
  </div>
  <div class="header-right">
    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Connecting...</span>
    </div>
    <input type="text" class="search-box" id="search" placeholder="Filter...">
  </div>
</header>
<main>
  <!-- Ports page -->
  <div class="page active" id="page-ports">
    <div class="stats">
      <span><strong id="totalPorts">0</strong> ports</span>
      <span><strong id="totalProcesses">0</strong> processes</span>
      <span>Updated: <strong id="lastUpdate">—</strong></span>
    </div>
    <table>
      <thead>
        <tr>
          <th data-col="port" class="sorted" style="width:5%">Port</th>
          <th data-col="proto" style="width:6%">Protocol</th>
          <th data-col="command">Command</th>
          <th data-col="pid" style="width:6%">PID</th>
          <th data-col="user" style="width:10%">User</th>
          <th data-col="address" style="width:8%">Address</th>
          <th data-col="count" style="width:5%">Count</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="7" class="empty-state"><p>Waiting for data...</p></td></tr>
      </tbody>
    </table>
  </div>

  <!-- GPU page -->
  <div class="page" id="page-gpu">
    <div class="stats" id="gpuStats">
      <span><strong id="totalGPUs">0</strong> GPUs</span>
      <span>Updated: <strong id="gpuLastUpdate">—</strong></span>
    </div>
    <div class="gpu-cards" id="gpuCards"></div>
    <div class="gpu-procs-section" id="gpuProcsSection" style="display:none">
      <h3>GPU Processes</h3>
      <table class="gpu-procs-table">
        <thead>
          <tr>
            <th style="width:8%">GPU</th>
            <th style="width:10%">PID</th>
            <th style="width:10%">User</th>
            <th>Process</th>
            <th style="width:12%">Memory</th>
          </tr>
        </thead>
        <tbody id="gpuProcsBody"></tbody>
      </table>
    </div>
  </div>
</main>

<script>
(function() {
  let portEntries = [];
  let gpuData = null;
  let sortCol = 'port';
  let sortAsc = true;
  let ws;
  let reconnectDelay = 1000;
  let activePage = 'ports';

  const tbody = document.getElementById('tableBody');
  const search = document.getElementById('search');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');

  // Tab switching
  document.querySelectorAll('.tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
      document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
      tab.classList.add('active');
      activePage = tab.dataset.page;
      document.getElementById('page-' + activePage).classList.add('active');
      search.placeholder = activePage === 'ports' ? 'Filter ports, processes...' : 'Filter GPUs, processes...';
      renderActive();
    });
  });

  function connect() {
    var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(proto + '//' + location.host + '/ws');

    ws.onopen = function() {
      statusDot.classList.add('connected');
      statusText.textContent = 'Connected';
      reconnectDelay = 1000;
    };

    ws.onmessage = function(e) {
      try {
        var msg = JSON.parse(e.data);
        if (msg.type === 'ports') {
          portEntries = msg.data || [];
          if (activePage === 'ports') renderPorts();
        } else if (msg.type === 'gpu') {
          gpuData = msg.data;
          pushGPUHistory();
          if (activePage === 'gpu') renderGPU();
        }
      } catch(err) {
        console.error('parse error:', err);
      }
    };

    ws.onclose = function() {
      statusDot.classList.remove('connected');
      statusText.textContent = 'Reconnecting...';
      setTimeout(connect, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 2, 30000);
    };

    ws.onerror = function() { ws.close(); };
  }

  function renderActive() {
    if (activePage === 'ports') renderPorts();
    else renderGPU();
  }

  function renderPorts() {
    var filter = search.value.toLowerCase();
    var filtered = portEntries;
    if (filter) {
      filtered = portEntries.filter(function(e) {
        return (
          String(e.port).includes(filter) ||
          e.proto.toLowerCase().includes(filter) ||
          (e.command || '').toLowerCase().includes(filter) ||
          String(e.pid).includes(filter) ||
          (e.user || '').toLowerCase().includes(filter) ||
          (e.address || '').toLowerCase().includes(filter)
        );
      });
    }

    filtered.sort(function(a, b) {
      var va = a[sortCol], vb = b[sortCol];
      if (typeof va === 'string') va = va.toLowerCase();
      if (typeof vb === 'string') vb = vb.toLowerCase();
      if (va < vb) return sortAsc ? -1 : 1;
      if (va > vb) return sortAsc ? 1 : -1;
      return 0;
    });

    var ports = new Set(portEntries.map(function(e) { return e.port; }));
    var procs = new Set(portEntries.filter(function(e) { return e.command; }).map(function(e) { return e.command; }));
    document.getElementById('totalPorts').textContent = ports.size;
    document.getElementById('totalProcesses').textContent = procs.size;
    document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();

    if (filtered.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" class="empty-state"><p>' +
        (portEntries.length ? 'No matches' : 'No listening ports') + '</p></td></tr>';
      return;
    }

    var html = '';
    for (var i = 0; i < filtered.length; i++) {
      var e = filtered[i];
      var protoClass = e.proto === 'tcp' ? 'proto-tcp' : 'proto-udp';
      html += '<tr>' +
        '<td>' + e.port + '</td>' +
        '<td><span class="proto ' + protoClass + '">' + e.proto + '</span></td>' +
        '<td title="' + (e.command || '').replace(/"/g, '&quot;') + '">' + (e.command || '\u2014') + '</td>' +
        '<td>' + (e.pid || '\u2014') + '</td>' +
        '<td>' + (e.user || '\u2014') + '</td>' +
        '<td>' + (e.address || '\u2014') + '</td>' +
        '<td>' + (e.count > 1 ? '<span class="count-badge">&times;' + e.count + '</span>' : '1') + '</td>' +
        '</tr>';
    }
    tbody.innerHTML = html;
  }

  // GPU chart state
  var HISTORY_LEN = 120;
  var utilHistory = {};
  var memHistory = {};

  function pushGPUHistory() {
    if (!gpuData || !gpuData.gpus) return;
    for (var i = 0; i < gpuData.gpus.length; i++) {
      var g = gpuData.gpus[i];
      if (!utilHistory[g.index]) utilHistory[g.index] = [];
      if (!memHistory[g.index]) memHistory[g.index] = [];
      utilHistory[g.index].push(g.gpu_util);
      var memPct = g.mem_total > 0 ? Math.round(g.mem_used / g.mem_total * 100) : 0;
      memHistory[g.index].push(memPct);
      if (utilHistory[g.index].length > HISTORY_LEN) utilHistory[g.index].shift();
      if (memHistory[g.index].length > HISTORY_LEN) memHistory[g.index].shift();
    }
  }

  function drawGPUCard(canvas, utilData, memData) {
    var dpr = window.devicePixelRatio || 1;
    var rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    var ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    var w = rect.width, h = rect.height;

    ctx.clearRect(0, 0, w, h);

    // Grid
    ctx.strokeStyle = '#30363d';
    ctx.lineWidth = 0.5;
    for (var pct = 25; pct <= 75; pct += 25) {
      var y = h - (pct / 100) * h;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
    }

    // Y-axis
    ctx.fillStyle = '#8b949e';
    ctx.font = '10px -apple-system, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText('100%', 30, 10);
    ctx.fillText('50%', 26, h / 2 + 3);
    ctx.fillText('0%', 20, h - 2);

    var padL = 35, plotW = w - padL;

    function drawLine(data, color) {
      if (!data || data.length < 2) return;
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      var step = plotW / (HISTORY_LEN - 1);
      var off = HISTORY_LEN - data.length;
      for (var j = 0; j < data.length; j++) {
        var x = padL + (off + j) * step;
        var yv = h - (data[j] / 100) * h;
        if (j === 0) ctx.moveTo(x, yv); else ctx.lineTo(x, yv);
      }
      ctx.stroke();
    }

    drawLine(utilData, '#58a6ff');
    drawLine(memData, '#3fb950');
  }

  function renderGPU() {
    var cardsEl = document.getElementById('gpuCards');
    var procsSection = document.getElementById('gpuProcsSection');
    var procsBody = document.getElementById('gpuProcsBody');

    if (!gpuData || !gpuData.gpus || gpuData.gpus.length === 0) {
      cardsEl.innerHTML = '';
      procsSection.style.display = 'none';
      document.getElementById('totalGPUs').textContent = '0';
      return;
    }

    document.getElementById('totalGPUs').textContent = gpuData.gpus.length;
    document.getElementById('gpuLastUpdate').textContent = new Date().toLocaleTimeString();

    // Create or update cards
    for (var i = 0; i < gpuData.gpus.length; i++) {
      var g = gpuData.gpus[i];
      var cardId = 'gpu-card-' + g.index;
      var card = document.getElementById(cardId);
      if (!card) {
        card = document.createElement('div');
        card.className = 'gpu-card';
        card.id = cardId;
        card.innerHTML =
          '<div class="gpu-card-header">' +
            '<span class="gpu-card-name"></span>' +
            '<span class="gpu-card-stats"></span>' +
          '</div>' +
          '<canvas></canvas>';
        cardsEl.appendChild(card);
      }
      var memPct = g.mem_total > 0 ? Math.round(g.mem_used / g.mem_total * 100) : 0;
      card.querySelector('.gpu-card-name').textContent = 'GPU ' + g.index + ': ' + g.name;
      card.querySelector('.gpu-card-stats').innerHTML =
        '<span class="util-val">Util: ' + g.gpu_util + '%</span>' +
        '<span class="mem-val">Mem: ' + g.mem_used + '/' + g.mem_total + ' MB</span>';
      drawGPUCard(card.querySelector('canvas'), utilHistory[g.index], memHistory[g.index]);
    }

    // GPU processes table
    var filter = search.value.toLowerCase();
    var procs = gpuData.processes || [];
    if (filter) {
      procs = procs.filter(function(p) {
        return p.name.toLowerCase().indexOf(filter) !== -1 ||
               String(p.pid).indexOf(filter) !== -1 ||
               String(p.gpu_index).indexOf(filter) !== -1 ||
               (p.user || '').toLowerCase().indexOf(filter) !== -1;
      });
    }
    if (procs.length > 0) {
      procsSection.style.display = 'block';
      var phtml = '';
      for (var j = 0; j < procs.length; j++) {
        var p = procs[j];
        phtml += '<tr>' +
          '<td>' + p.gpu_index + '</td>' +
          '<td>' + p.pid + '</td>' +
          '<td>' + esc(p.user || '\u2014') + '</td>' +
          '<td title="' + esc(p.name) + '">' + esc(p.name) + '</td>' +
          '<td>' + p.mem_used_mb + ' MB</td>' +
          '</tr>';
      }
      procsBody.innerHTML = phtml;
    } else {
      procsSection.style.display = 'none';
    }
  }

  function esc(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Column sorting (ports table)
  document.querySelectorAll('#page-ports thead th').forEach(function(th) {
    th.addEventListener('click', function() {
      var col = th.dataset.col;
      if (sortCol === col) {
        sortAsc = !sortAsc;
      } else {
        sortCol = col;
        sortAsc = true;
      }
      document.querySelectorAll('#page-ports thead th').forEach(function(t) { t.classList.remove('sorted'); });
      th.classList.add('sorted');
      renderPorts();
    });
  });

  search.addEventListener('input', renderActive);

  // Column resizing (ports table)
  document.querySelectorAll('#page-ports thead th').forEach(function(th) {
    var handle = document.createElement('div');
    handle.className = 'resize-handle';
    th.appendChild(handle);

    var startX, startW, resizing = false;
    handle.addEventListener('mousedown', function(e) {
      e.stopPropagation();
      resizing = true;
      startX = e.pageX;
      startW = th.offsetWidth;
      handle.classList.add('active');

      function onMove(e) {
        th.style.width = (startW + e.pageX - startX) + 'px';
      }
      function onUp() {
        handle.classList.remove('active');
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        setTimeout(function() { resizing = false; }, 0);
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
    th.addEventListener('click', function(e) {
      if (resizing) e.stopImmediatePropagation();
    });
  });

  connect();
})();
</script>
</body>
</html>
