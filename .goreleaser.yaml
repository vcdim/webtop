version: 2

builds:
  - main: .
    binary: webtop
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

nfpms:
  - id: webtop
    package_name: webtop
    vendor: vcdim
    homepage: https://github.com/vcdim/webtop
    maintainer: vcdim
    description: Lightweight web-based system dashboard
    license: MIT
    formats:
      - deb
      - rpm
    contents:
      - src: webtop.service
        dst: /etc/systemd/system/webtop.service
    scripts:
      postinstall: scripts/postinstall.sh
      preremove: scripts/preremove.sh

brews:
  - repository:
      owner: vcdim
      name: webtop
      branch: homebrew
    directory: HomebrewFormula
    homepage: https://github.com/vcdim/webtop
    description: Lightweight web-based system dashboard
    license: MIT

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
